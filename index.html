<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="1% Daily">
<title>1% Daily Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;padding:12px 12px 100px}

.header{background:linear-gradient(135deg,#6C5CE7,#a78bfa);border-radius:16px;padding:20px;margin-bottom:14px;color:#fff}
.h-sub{font-size:10px;text-transform:uppercase;letter-spacing:2px;opacity:.7}
.h-title{font-size:22px;font-weight:800;margin-top:2px}
.h-streak{font-size:13px;margin-top:6px;opacity:.9}

.tabs{display:flex;background:#fff;border-radius:12px;padding:3px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab{flex:1;text-align:center;padding:10px;font-size:12px;font-weight:600;color:#86868b;border-radius:10px;cursor:pointer;border:none;background:none}
.tab.on{background:#6C5CE7;color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3)}

.dnav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:10px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dnav button{background:none;border:none;color:#6C5CE7;font-size:24px;cursor:pointer;padding:4px 12px;font-weight:700}

.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cat{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.cat-bar{height:3px;flex:1;border-radius:2px;opacity:.3}

.row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f2;cursor:pointer;-webkit-tap-highlight-color:transparent}
.row:last-child{border-bottom:none}
.chk{width:24px;height:24px;border:2.5px solid #d1d1d6;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin-top:1px;transition:.15s}
.chk.on{background:#34C759;border-color:#34C759}
.chk.on::after{content:'✓'}
.rname{font-size:14px;font-weight:600;color:#1d1d1f}
.rdesc{font-size:11px;color:#86868b;margin-top:2px;line-height:1.4}
.row.done .rname{opacity:.45;text-decoration:line-through}
.row.done .rdesc{opacity:.3}

.nbox{display:flex;align-items:center;gap:8px;margin-top:6px;padding:6px 10px;background:#f5f5f7;border-radius:8px}
.nbox span{font-size:11px;color:#86868b;flex:1}
.nbox input{width:54px;background:#fff;border:1.5px solid #d1d1d6;border-radius:6px;color:#1d1d1f;font-size:14px;padding:5px 8px;text-align:center}
.nbox input:focus{border-color:#6C5CE7;outline:none}

.adda{display:flex;gap:8px;margin-top:10px}
.adda input{flex:1;background:#f5f5f7;border:1.5px solid #d1d1d6;border-radius:10px;color:#1d1d1f;font-size:13px;padding:11px 14px}
.adda input::placeholder{color:#aeaeb2}
.adda input:focus{border-color:#6C5CE7;outline:none;background:#fff}
.adda button{background:#6C5CE7;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.del{color:#FF3B30;font-size:20px;cursor:pointer;padding:0 4px;opacity:.5;flex-shrink:0}

.submit-wrap{position:sticky;bottom:12px;z-index:10;padding-top:8px}
.submit-btn{width:100%;background:linear-gradient(135deg,#34C759,#30B350);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 15px rgba(52,199,89,.35);transition:.15s;letter-spacing:.3px}
.submit-btn:active{transform:scale(.97);opacity:.9}
.submit-btn.saved{background:linear-gradient(135deg,#6C5CE7,#a78bfa);box-shadow:0 4px 15px rgba(108,92,231,.35)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

.quote{text-align:center;font-size:12px;color:#aeaeb2;font-style:italic;margin:16px 16px 20px;line-height:1.5}

/* Calendar */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cg .hd{font-size:10px;color:#86868b;text-align:center;padding:4px;font-weight:600}
.cd{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;background:#f5f5f7;color:#aeaeb2}
.cd.perfect{background:#34C759;color:#fff}
.cd.partial{background:#E8F5E9;color:#2E7D32}
.cd.today{outline:2.5px solid #6C5CE7;outline-offset:-1px}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mnav button{background:none;border:none;color:#6C5CE7;font-size:20px;cursor:pointer;padding:4px 10px;font-weight:700}

/* Report */
.sbox{background:#f5f5f7;border-radius:10px;padding:14px;text-align:center}
.sbox .big{font-size:26px;font-weight:800}
.sbox .sm{font-size:10px;color:#86868b;margin-top:2px;font-weight:500}
.gbtn{width:100%;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.gbtn:active{opacity:.85}
select{width:100%;background:#f5f5f7;border:1.5px solid #d1d1d6;border-radius:10px;color:#1d1d1f;font-size:14px;padding:11px;font-family:inherit;margin-bottom:12px}
select:focus{border-color:#6C5CE7;outline:none}
.empty{color:#aeaeb2;font-size:12px;text-align:center;padding:14px}
</style>
</head>
<body>

<div class="header">
  <div class="h-sub">1% Better Every Day</div>
  <div class="h-title" id="greet"></div>
  <div class="h-streak" id="streak"></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" data-tab="today">Today</button>
  <button class="tab" data-tab="cal">Calendar</button>
  <button class="tab" data-tab="report">Report</button>
</div>

<div id="v-today"></div>
<div id="v-cal" style="display:none"></div>
<div id="v-report" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
var HEALTH = [
  {id:'workout', name:'Workout / Exercise', desc:'Minimum 30 min — gym, running, yoga, or home workout', color:'#34C759'},
  {id:'water', name:'Water Intake — 4L+', desc:'1 bottle = 1L. Finish 4 bottles minimum', color:'#34C759'},
  {id:'sleep', name:'Slept Before 11 PM', desc:'Last night sleep. Discipline starts the night before', color:'#34C759'},
  {id:'nojunk', name:'No Junk Food Today', desc:'No fried food, chips, cold drinks, or sweets', color:'#34C759'}
];
var HUSTLE = [
  {id:'dynamo', name:'Dynamo Scripting — 30 min', desc:'Practice Dynamo or Python scripts daily', color:'#6C5CE7'},
  {id:'startup', name:'Startup Outreach — 10 Emails', desc:'Send cold pitch deck emails to 10 new startups', numId:'startup_r', numLabel:'Responses received today', color:'#6C5CE7'},
  {id:'shop', name:'Google Reviews — Visit 3 Shops', desc:'Find 3 new shops, talk to owners about Google reviews', numId:'shop_r', numLabel:'Reviews or responses received', color:'#6C5CE7'},
  {id:'youtube', name:'BIM Insights — YouTube Work', desc:'Write a script, edit a reel, post content, or plan next video', color:'#6C5CE7'},
  {id:'gulf', name:'Gulf Career — 1 Application', desc:'Apply to 1 Gulf job, follow up, or update portal profile', color:'#6C5CE7'}
];
var QUOTES = [
  'Small daily improvements lead to stunning results.',
  'You do not have to be extreme, just consistent.',
  '1% better every day = 37x better in a year.',
  'Discipline is choosing what you want most over what you want now.',
  'Your future is created by what you do today.',
  'Hard work beats talent when talent does not work hard.',
  'The secret of getting ahead is getting started.',
  'Do not count the days, make the days count.',
  'Success is small efforts repeated day in and day out.',
  'Push yourself, because no one else is going to do it for you.'
];
var ALL = HEALTH.concat(HUSTLE);
var curDate = new Date();
var calMon = new Date();
var pendingData = {};

function fmt(d){return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function p(n){return n<10?'0'+n:''+n;}
function today(){return fmt(new Date());}
function mkd(s){return new Date(s+'T00:00:00');}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function load(ds){try{var v=localStorage.getItem('d_'+ds);return v?JSON.parse(v):{};}catch(e){return {};}}
function save(ds,obj){localStorage.setItem('d_'+ds,JSON.stringify(obj));}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

function cntDone(obj){
  var done=0,total=ALL.length;
  for(var i=0;i<ALL.length;i++) if(obj[ALL[i].id]) done++;
  var cu=obj.custom||[];
  total+=cu.length;
  for(var i=0;i<cu.length;i++) if(cu[i].done) done++;
  return{done:done,total:total};
}
function calcStreak(){
  var s=0,d=new Date();
  for(var i=0;i<60;i++){
    var ds=fmt(d),obj=load(ds),c=cntDone(obj);
    if(c.done===0&&ds!==today()) break;
    if(c.done>0&&c.done>=Math.ceil(c.total*0.6)) s++;
    else if(ds!==today()) break;
    d.setDate(d.getDate()-1);
  }
  var el=document.getElementById('streak');
  if(s>0) el.innerHTML='&#128293; <b>'+s+' day'+(s>1?'s':'')+'</b> streak — keep going!';
  else el.textContent='Start your streak today — complete 60%+ tasks';
}
function setGreet(){
  var h=new Date().getHours();
  document.getElementById('greet').textContent=(h<12?'Good Morning':h<17?'Good Afternoon':'Good Evening')+', Aashu';
}

// TABS
document.getElementById('tabs').addEventListener('click',function(e){
  var btn=e.target; if(!btn.dataset.tab) return;
  var t=btn.dataset.tab;
  var bs=document.querySelectorAll('.tab');
  for(var i=0;i<bs.length;i++) bs[i].className=bs[i].dataset.tab===t?'tab on':'tab';
  document.getElementById('v-today').style.display=t==='today'?'':'none';
  document.getElementById('v-cal').style.display=t==='cal'?'':'none';
  document.getElementById('v-report').style.display=t==='report'?'':'none';
  if(t==='today') renderToday();
  if(t==='cal') renderCal();
  if(t==='report') renderReport();
});

// TODAY
function renderToday(){
  var ds=fmt(curDate),isTd=ds===today(),isFut=curDate>new Date();
  pendingData=load(ds);
  var dlbl=curDate.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
  var dot=isTd?' <span style="display:inline-block;width:7px;height:7px;background:#34C759;border-radius:50%;vertical-align:middle"></span>':'';
  var sub=isTd?'Today':String(curDate.getFullYear());

  var h='<div class="dnav"><button id="dprev">&#8249;</button><div style="text-align:center"><div style="font-size:15px;font-weight:700">'+dlbl+dot+'</div><div style="font-size:11px;color:#86868b">'+sub+'</div></div><button id="dnext">&#8250;</button></div>';

  h+='<div class="card"><div class="cat"><span>&#128170;</span> Health <div class="cat-bar" style="background:#34C759"></div></div>';
  for(var i=0;i<HEALTH.length;i++) h+=buildTask(HEALTH[i],pendingData,isFut);
  h+='</div>';

  h+='<div class="card"><div class="cat"><span>&#128640;</span> Hustle <div class="cat-bar" style="background:#6C5CE7"></div></div>';
  for(var i=0;i<HUSTLE.length;i++) h+=buildTask(HUSTLE[i],pendingData,isFut);
  h+='</div>';

  h+='<div class="card"><div class="cat"><span>&#128204;</span> Custom Tasks <div class="cat-bar" style="background:#FF9500"></div></div>';
  var cu=pendingData.custom||[];
  if(cu.length===0) h+='<div class="empty">No custom tasks. Add below.</div>';
  for(var i=0;i<cu.length;i++){
    h+='<div class="row'+(cu[i].done?' done':'')+'" data-ci="'+i+'"><div class="chk'+(cu[i].done?' on':'')+'"></div><div style="flex:1"><div class="rname">'+esc(cu[i].text)+'</div></div>';
    if(!isFut) h+='<span class="del" data-di="'+i+'">&#215;</span>';
    h+='</div>';
  }
  if(!isFut) h+='<div class="adda"><input id="cinp" placeholder="Add a task..." maxlength="100"><button id="cadd">+ Add</button></div>';
  h+='</div>';

  var doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);
  h+='<div class="quote">"'+QUOTES[doy%QUOTES.length]+'"</div>';

  if(!isFut) h+='<div class="submit-wrap"><button class="submit-btn" id="submitBtn">&#10003; Submit Today\'s Progress</button></div>';

  document.getElementById('v-today').innerHTML=h;
  bindToday(ds,isFut);
}

function buildTask(t,obj,fut){
  var on=!!obj[t.id];
  var h='<div class="row'+(on?' done':'')+'" data-tid="'+t.id+'"><div class="chk'+(on?' on':'')+'"></div><div style="flex:1"><div class="rname">'+t.name+'</div><div class="rdesc">'+t.desc+'</div>';
  if(t.numId){
    var v=obj[t.numId]||0;
    h+='<div class="nbox" data-stop="1"><span>'+t.numLabel+'</span><input type="number" min="0" value="'+v+'" data-nid="'+t.numId+'"'+(fut?' disabled':'')+'></div>';
  }
  h+='</div></div>';
  return h;
}

function bindToday(ds,fut){
  document.getElementById('dprev').onclick=function(){curDate.setDate(curDate.getDate()-1);renderToday();};
  document.getElementById('dnext').onclick=function(){curDate.setDate(curDate.getDate()+1);renderToday();};

  var rows=document.querySelectorAll('[data-tid]');
  for(var i=0;i<rows.length;i++){
    rows[i].addEventListener('click',function(e){
      if(fut||e.target.closest('[data-stop]')) return;
      var id=this.getAttribute('data-tid');
      pendingData[id]=!pendingData[id];
      renderToday();
    });
  }
  var nums=document.querySelectorAll('[data-nid]');
  for(var i=0;i<nums.length;i++){
    nums[i].addEventListener('change',function(){
      pendingData[this.getAttribute('data-nid')]=parseInt(this.value)||0;
    });
  }
  var crows=document.querySelectorAll('[data-ci]');
  for(var i=0;i<crows.length;i++){
    crows[i].addEventListener('click',function(e){
      if(fut||e.target.hasAttribute('data-di')) return;
      var idx=parseInt(this.getAttribute('data-ci'));
      if(pendingData.custom&&pendingData.custom[idx]) pendingData.custom[idx].done=!pendingData.custom[idx].done;
      renderToday();
    });
  }
  var dels=document.querySelectorAll('[data-di]');
  for(var i=0;i<dels.length;i++){
    dels[i].addEventListener('click',function(e){
      e.stopPropagation();
      var idx=parseInt(this.getAttribute('data-di'));
      if(pendingData.custom){pendingData.custom.splice(idx,1);renderToday();}
    });
  }
  var ab=document.getElementById('cadd'),ai=document.getElementById('cinp');
  if(ab){
    ab.onclick=function(){var t=ai.value.trim();if(!t)return;if(!pendingData.custom)pendingData.custom=[];pendingData.custom.push({text:t,done:false});renderToday();};
    ai.onkeydown=function(e){if(e.key==='Enter')ab.onclick();};
  }
  var sb=document.getElementById('submitBtn');
  if(sb){
    sb.onclick=function(){
      save(ds,pendingData);
      calcStreak();
      var c=cntDone(pendingData);
      sb.textContent='&#10003; Saved! '+c.done+'/'+c.total+' tasks done';
      sb.classList.add('saved');
      showToast('&#9989; Progress saved for '+curDate.toLocaleDateString('en-IN',{day:'numeric',month:'short'}));
      setTimeout(function(){sb.innerHTML='&#10003; Submit Today\'s Progress';sb.classList.remove('saved');},3000);
    };
  }
}

// CALENDAR
function renderCal(){
  var y=calMon.getFullYear(),m=calMon.getMonth();
  var mlbl=calMon.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  var first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),now=new Date();
  var h='<div class="card"><div class="mnav"><button id="cmprev">&#8249;</button><span style="font-size:15px;font-weight:700">'+mlbl+'</span><button id="cmnext">&#8250;</button></div><div class="cg">';
  var days=['S','M','T','W','T','F','S'];
  for(var i=0;i<7;i++) h+='<div class="hd">'+days[i]+'</div>';
  for(var i=0;i<first;i++) h+='<div></div>';
  for(var d=1;d<=dim;d++){
    var ds=y+'-'+p(m+1)+'-'+p(d),dt=new Date(y,m,d),isFut=dt>now,isTd=ds===today();
    var obj=load(ds),c=cntDone(obj);
    var cls='cd';
    if(isTd) cls+=' today';
    if(!isFut&&c.done>0&&c.done===c.total) cls+=' perfect';
    else if(!isFut&&c.done>0) cls+=' partial';
    h+='<div class="'+cls+'" data-cd="'+ds+'">'+d+'</div>';
  }
  h+='</div></div><div id="cdtl"></div>';
  document.getElementById('v-cal').innerHTML=h;
  document.getElementById('cmprev').onclick=function(){calMon.setMonth(calMon.getMonth()-1);renderCal();};
  document.getElementById('cmnext').onclick=function(){calMon.setMonth(calMon.getMonth()+1);renderCal();};
  var cds=document.querySelectorAll('[data-cd]');
  for(var i=0;i<cds.length;i++) cds[i].addEventListener('click',function(){
    var ds=this.getAttribute('data-cd');if(mkd(ds)>new Date())return;showDetail(ds);
  });
}
function showDetail(ds){
  var obj=load(ds),c=cntDone(obj),dlbl=mkd(ds).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
  var pct=c.total>0?Math.round(c.done/c.total*100):0;
  var h='<div class="card"><div class="cat">'+dlbl+' &#8212; '+pct+'%</div>';
  if(c.total===0) h+='<div class="empty">No data recorded</div>';
  else{
    for(var i=0;i<ALL.length;i++){
      var t=ALL[i],ok=!!obj[t.id];
      h+='<div style="font-size:13px;padding:4px 0;color:'+(ok?'#34C759':'#d1d1d6')+'"><span style="font-weight:700">'+(ok?'&#10003;':'&#10005;')+'</span> '+t.name+'</div>';
      if(t.numId&&obj[t.numId]) h+='<div style="font-size:11px;color:#86868b;padding-left:20px">&#8627; '+t.numLabel+': '+obj[t.numId]+'</div>';
    }
    var cu=obj.custom||[];
    for(var i=0;i<cu.length;i++) h+='<div style="font-size:13px;padding:4px 0;color:'+(cu[i].done?'#34C759':'#d1d1d6')+'"><span style="font-weight:700">'+(cu[i].done?'&#10003;':'&#10005;')+'</span> '+esc(cu[i].text)+'</div>';
  }
  h+='</div>';
  document.getElementById('cdtl').innerHTML=h;
}

// REPORT
function renderReport(){
  var now=new Date(),opts='';
  for(var i=0;i<6;i++){var d=new Date(now.getFullYear(),now.getMonth()-i,1);var v=d.getFullYear()+'-'+p(d.getMonth()+1);opts+='<option value="'+v+'">'+d.toLocaleDateString('en-IN',{month:'long',year:'numeric'})+'</option>';}
  var h='<div class="card"><div class="cat"><span>&#128202;</span> Monthly Report</div><select id="rmon">'+opts+'</select><div id="rbody"></div>';
  h+='<button class="gbtn" id="rdl" style="background:linear-gradient(135deg,#34C759,#30B350)">&#128229; Download Habit Tracker Excel</button>';
  h+='</div>';
  document.getElementById('v-report').innerHTML=h;
  document.getElementById('rmon').onchange=showRep;
  document.getElementById('rdl').onclick=dlExcel;
  showRep();
}
function getStats(){
  var ym=document.getElementById('rmon').value,parts=ym.split('-'),y=parseInt(parts[0]),m=parseInt(parts[1]);
  var dim=new Date(y,m,0).getDate(),rows=[],ts=0,tp=0,sr=0,shr=0;
  for(var d=1;d<=dim;d++){
    var ds=y+'-'+p(m)+'-'+p(d);if(mkd(ds)>new Date())break;
    var obj=load(ds),c=cntDone(obj);ts+=c.done;tp+=c.total;sr+=(obj.startup_r||0);shr+=(obj.shop_r||0);
    rows.push({ds:ds,obj:obj,c:c});
  }
  return{rows:rows,ts:ts,tp:tp,sr:sr,shr:shr,ym:ym,y:y,m:m,dim:dim};
}
function showRep(){
  var s=getStats(),pct=s.tp>0?Math.round(s.ts/s.tp*100):0;
  var active=0,perfect=0;
  for(var i=0;i<s.rows.length;i++){if(s.rows[i].c.done>0)active++;if(s.rows[i].c.done===s.rows[i].c.total&&s.rows[i].c.total>0)perfect++;}
  var pc=pct>=70?'#34C759':pct>=40?'#FF9500':'#FF3B30';
  var h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  h+='<div class="sbox"><div class="big" style="color:'+pc+'">'+pct+'%</div><div class="sm">Overall Score</div></div>';
  h+='<div class="sbox"><div class="big" style="color:#6C5CE7">'+active+'</div><div class="sm">Active Days</div></div>';
  h+='<div class="sbox"><div class="big" style="color:#FF9500">'+perfect+'</div><div class="sm">Perfect Days</div></div>';
  h+='<div class="sbox"><div class="big" style="color:#007AFF">'+(s.sr+s.shr)+'</div><div class="sm">Total Responses</div></div>';
  h+='</div><div style="font-size:11px;color:#86868b">Startup: <b style="color:#1d1d1f">'+s.sr+'</b> | Shop: <b style="color:#1d1d1f">'+s.shr+'</b></div>';
  document.getElementById('rbody').innerHTML=h;
}

// EXCEL — Grid style like advanced habit tracker
function dlExcel(){

  var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><style>';
  html+='table{border-collapse:collapse;font-family:Calibri,sans-serif;font-size:11px}';
  html+='td,th{border:1px solid #D9D9D9;padding:6px 8px;text-align:center;vertical-align:middle}';

  html+='.subtitle{font-size:11px;color:#888;border:none;text-align:left;padding:2px 8px}';
  html+='.cat-health{background:#E8F5E9;color:#2E7D32;font-weight:bold;text-align:left;font-size:10px}';
  html+='.cat-hustle{background:#EDE7F6;color:#5E35B1;font-weight:bold;text-align:left;font-size:10px}';
  html+='.habit{text-align:left;font-weight:600;background:#FAFAFA}';
  html+='.day-head{background:#F5F5F5;font-weight:bold;color:#333;font-size:10px}';
  html+='.done{background:#C8E6C9;color:#2E7D32;font-weight:bold}';
  html+='.miss{background:#FFF;color:#DDD}';
  html+='.pct-good{background:#E8F5E9;color:#2E7D32;font-weight:bold}';
  html+='.pct-ok{background:#FFF8E1;color:#F57F17;font-weight:bold}';
  html+='.pct-bad{background:#FFEBEE;color:#C62828;font-weight:bold}';
  html+='.num-val{background:#E3F2FD;color:#1565C0;font-weight:bold}';
  html+='.summary-label{text-align:left;font-weight:bold;background:#F5F5F5;color:#333}';
  html+='.summary-val{font-weight:bold;color:#6C5CE7;font-size:13px}';
  html+='</style></head><body>';

  // Title
  html+='<table><tr><td class="title" colspan="'+(s.rows.length+3)+'">&#127775; 1% Daily — Habit Tracker</td></tr>';
  html+='<tr><td class="subtitle" colspan="'+(s.rows.length+3)+'">'+mName+' | Aashu Kumar</td></tr>';
  html+='<tr><td colspan="'+(s.rows.length+3)+'" style="border:none">&nbsp;</td></tr>';

  // Header row: Habit | 1 | 2 | 3 ... | %
  html+='<tr><th class="day-head" style="text-align:left;min-width:180px">Habit</th>';
  for(var i=0;i<s.rows.length;i++){
    var d=mkd(s.rows[i].ds);
    var dayName=d.toLocaleDateString('en-IN',{weekday:'narrow'});
    html+='<th class="day-head" style="min-width:28px">'+(i+1)+'<br><span style="font-size:8px;color:#999">'+dayName+'</span></th>';
  }
  html+='<th class="day-head">%</th></tr>';

  // Health category
  html+='<tr><td class="cat-health" colspan="'+(s.rows.length+2)+'">&#128154; HEALTH</td></tr>';
  for(var i=0;i<HEALTH.length;i++) html+=habitRow(HEALTH[i],s.rows);

  // Hustle category
  html+='<tr><td class="cat-hustle" colspan="'+(s.rows.length+2)+'">&#128156; HUSTLE</td></tr>';
  for(var i=0;i<HUSTLE.length;i++) html+=habitRow(HUSTLE[i],s.rows);

  // Number tracking rows
  html+='<tr><td colspan="'+(s.rows.length+2)+'" style="border:none">&nbsp;</td></tr>';
  html+='<tr><th class="day-head" style="text-align:left">Metric</th>';
  for(var i=0;i<s.rows.length;i++) html+='<th class="day-head">'+(i+1)+'</th>';
  html+='<th class="day-head">Total</th></tr>';

  // Startup responses
  var stTotal=0;
  html+='<tr><td class="habit">&#128231; Startup Responses</td>';
  for(var i=0;i<s.rows.length;i++){var v=s.rows[i].obj.startup_r||0;stTotal+=v;html+='<td class="'+(v>0?'num-val':'miss')+'">'+(v>0?v:'-')+'</td>';}
  html+='<td class="num-val">'+stTotal+'</td></tr>';

  // Shop responses
  var shTotal=0;
  html+='<tr><td class="habit">&#127978; Shop Responses</td>';
  for(var i=0;i<s.rows.length;i++){var v=s.rows[i].obj.shop_r||0;shTotal+=v;html+='<td class="'+(v>0?'num-val':'miss')+'">'+(v>0?v:'-')+'</td>';}
  html+='<td class="num-val">'+shTotal+'</td></tr>';

  // Daily score row
  html+='<tr><td colspan="'+(s.rows.length+2)+'" style="border:none">&nbsp;</td></tr>';
  html+='<tr><td class="habit" style="background:#EDE7F6">Daily Score</td>';
  for(var i=0;i<s.rows.length;i++){
    var c=s.rows[i].c,dp=c.total>0?Math.round(c.done/c.total*100):0;
    var cls=dp>=70?'pct-good':dp>=40?'pct-ok':dp>0?'pct-bad':'miss';
    html+='<td class="'+cls+'">'+(dp>0?dp+'%':'-')+'</td>';
  }
  var op=s.tp>0?Math.round(s.ts/s.tp*100):0;
  html+='<td class="'+(op>=70?'pct-good':op>=40?'pct-ok':'pct-bad')+'">'+op+'%</td></tr>';

  // Summary section
  var active=0,perfect=0;
  for(var i=0;i<s.rows.length;i++){if(s.rows[i].c.done>0)active++;if(s.rows[i].c.done===s.rows[i].c.total&&s.rows[i].c.total>0)perfect++;}

  html+='<tr><td colspan="'+(s.rows.length+2)+'" style="border:none">&nbsp;</td></tr>';
  html+='<tr><td class="title" colspan="'+(s.rows.length+2)+'">&#128202; Summary</td></tr>';
  html+='<tr><td class="summary-label" colspan="2">Overall Score</td><td class="summary-val" colspan="'+(s.rows.length-1)+'">'+s.ts+'/'+s.tp+' ('+op+'%)</td></tr>';
  html+='<tr><td class="summary-label" colspan="2">Active Days</td><td class="summary-val" colspan="'+(s.rows.length-1)+'">'+active+' / '+s.rows.length+'</td></tr>';
  html+='<tr><td class="summary-label" colspan="2">Perfect Days</td><td class="summary-val" colspan="'+(s.rows.length-1)+'">'+perfect+'</td></tr>';
  html+='<tr><td class="summary-label" colspan="2">Startup Responses</td><td class="summary-val" colspan="'+(s.rows.length-1)+'">'+stTotal+'</td></tr>';
  html+='<tr><td class="summary-label" colspan="2">Shop Responses</td><td class="summary-val" colspan="'+(s.rows.length-1)+'">'+shTotal+'</td></tr>';

  html+='</table></body></html>';

  var blob=new Blob([html],{type:'application/vnd.ms-excel'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Aashu_Habit_Tracker_'+s.ym+'.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('&#128229; Excel downloaded!');
}

function habitRow(t,rows){
  var done=0;
  var h='<tr><td class="habit">'+t.name+'</td>';
  for(var i=0;i<rows.length;i++){
    var on=!!rows[i].obj[t.id];
    if(on) done++;
    h+='<td class="'+(on?'done':'miss')+'">'+(on?'&#10003;':'-')+'</td>';
  }
  var pct=rows.length>0?Math.round(done/rows.length*100):0;
  var cls=pct>=70?'pct-good':pct>=40?'pct-ok':'pct-bad';
  h+='<td class="'+cls+'">'+pct+'%</td></tr>';
  return h;
}
