<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
#root{max-width:500px;margin:0 auto}

/* Common */
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-t{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:700}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
.btn:active{opacity:.85}
.btn:disabled{opacity:.5}
.btn-purple{background:linear-gradient(135deg,#6C5CE7,#a78bfa)}
.btn-green{background:linear-gradient(135deg,#34C759,#30B350)}
.btn-small{padding:10px 16px;font-size:13px;width:auto;border-radius:10px}
input,select,textarea{width:100%;font-size:14px;padding:11px 14px;border:1.5px solid #d1d1d6;border-radius:10px;background:#f5f5f7;color:#1d1d1f;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#6C5CE7;outline:none;background:#fff}
textarea{resize:vertical;min-height:50px}
input::placeholder,textarea::placeholder{color:#aeaeb2}
label{font-size:12px;color:#86868b;font-weight:600;display:block;margin-bottom:4px;margin-top:12px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.empty{color:#aeaeb2;font-size:12px;text-align:center;padding:14px}
.quote{text-align:center;font-size:12px;color:#aeaeb2;font-style:italic;margin:16px 16px 20px;line-height:1.5}

/* Login */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;text-align:center}
.login h1{font-size:28px;color:#6C5CE7;margin-top:8px}
.login p{font-size:14px;color:#86868b;margin:8px 0 30px;line-height:1.5}
.g-btn{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #d1d1d6;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);color:#1d1d1f}
.g-btn img{width:20px;height:20px}
.feat{font-size:13px;color:#86868b;padding:6px 0;text-align:left}

/* Onboarding */
.onboard{padding:20px 16px;min-height:100vh}
.ob-title{font-size:22px;font-weight:800;color:#6C5CE7;margin-bottom:4px}
.ob-sub{font-size:13px;color:#86868b;margin-bottom:20px}
.ob-step{font-size:11px;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.freq-pills{display:flex;gap:8px;margin-top:4px}
.freq-pill{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d1d1d6;color:#86868b;background:#f5f5f7}
.freq-pill.on{background:#6C5CE7;color:#fff;border-color:#6C5CE7}
.task-preview{display:flex;align-items:center;gap:10px;padding:10px;background:#f5f5f7;border-radius:10px;margin-top:8px}
.task-preview .name{flex:1;font-size:13px;font-weight:600}
.task-preview .freq{font-size:10px;color:#fff;background:#6C5CE7;padding:2px 8px;border-radius:10px}
.task-preview .del{color:#FF3B30;font-size:18px;cursor:pointer;padding:0 6px}

/* App Shell */
.app{padding:12px 12px 120px}
.hdr{background:linear-gradient(135deg,#6C5CE7,#a78bfa);border-radius:16px;padding:16px 20px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:14px}
.av{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover}
.hdr .info{flex:1}
.hdr .lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;opacity:.7}
.hdr .nm{font-size:18px;font-weight:800;margin-top:1px}
.hdr .stk{font-size:12px;opacity:.85;margin-top:3px}
.so{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer}
.tabs{display:flex;background:#fff;border-radius:12px;padding:3px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tb{flex:1;text-align:center;padding:9px 4px;font-size:11px;font-weight:600;color:#86868b;border-radius:10px;cursor:pointer;border:none;background:none}
.tb.on{background:#6C5CE7;color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3)}
.dn{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:10px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dn button{background:none;border:none;color:#6C5CE7;font-size:24px;cursor:pointer;padding:4px 12px;font-weight:700}
.locked-msg{background:#FFF3CD;color:#856404;font-size:12px;padding:10px 14px;border-radius:10px;text-align:center;margin-bottom:12px;font-weight:600}

/* Tasks */
.rw{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f2;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rw:last-child{border-bottom:none}
.ck{width:24px;height:24px;border:2.5px solid #d1d1d6;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin-top:1px;transition:.15s}
.ck.on{background:#34C759;border-color:#34C759}
.tn{font-size:14px;font-weight:600;color:#1d1d1f}
.td2{font-size:11px;color:#86868b;margin-top:2px}
.rw.dn3 .tn{opacity:.45;text-decoration:line-through}
.rw.dn3 .td2{opacity:.3}
.nb{display:flex;align-items:center;gap:8px;margin-top:6px;padding:6px 10px;background:#f5f5f7;border-radius:8px}
.nb span{font-size:11px;color:#86868b;flex:1}
.nb input{width:54px;background:#fff;border:1.5px solid #d1d1d6;border-radius:6px;color:#1d1d1f;font-size:14px;padding:5px 8px;text-align:center}
.nb input:focus{border-color:#6C5CE7;outline:none}
.freq-tag{font-size:9px;color:#6C5CE7;background:#EDE7F6;padding:2px 6px;border-radius:6px;font-weight:700;margin-left:6px;text-transform:uppercase}

/* Submit */
.sub-wrap{position:sticky;bottom:12px;z-index:10}
.sub-btn{width:100%;background:linear-gradient(135deg,#34C759,#30B350);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 15px rgba(52,199,89,.35)}
.sub-btn:active{transform:scale(.97)}
.sub-btn.saved{background:linear-gradient(135deg,#6C5CE7,#a78bfa)}
.sub-btn:disabled{opacity:.6}

/* Calendar */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cg .ch{font-size:10px;color:#86868b;text-align:center;padding:4px;font-weight:600}
.cy{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;background:#f5f5f7;color:#aeaeb2}
.cy.pf{background:#34C759;color:#fff}
.cy.pt{background:#E8F5E9;color:#2E7D32}
.cy.now{outline:2.5px solid #6C5CE7;outline-offset:-1px}
.mn{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mn button{background:none;border:none;color:#6C5CE7;font-size:20px;cursor:pointer;padding:4px 10px;font-weight:700}

/* Rewards */
.rew-banner{background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:14px;padding:20px;margin-bottom:12px;text-align:center;color:#1d1d1f;box-shadow:0 2px 12px rgba(255,165,0,.25)}
.rew-code{background:#fff;border-radius:8px;padding:10px;margin-top:10px;font-size:20px;font-weight:800;color:#6C5CE7;letter-spacing:3px;font-family:monospace}
.pbar{background:#f5f5f7;border-radius:10px;height:12px;margin-top:14px;overflow:hidden}
.pfill{background:linear-gradient(90deg,#6C5CE7,#a78bfa);height:100%;border-radius:10px}
.ms{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f2}
.ms:last-child{border-bottom:none}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:10px;background:#f0f0f2;border-radius:12px;padding:4px 10px;color:#86868b;font-weight:600}
.badge.earned{background:#E8F5E9;color:#2E7D32}
.badge.gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1d1d1f}

/* Report */
.sb{background:#f5f5f7;border-radius:10px;padding:14px;text-align:center}
.sb .big{font-size:26px;font-weight:800}
.sb .sm{font-size:10px;color:#86868b;margin-top:2px}
</style>
</head>

var U=null,UD=null,CD=new Date(),CM=new Date(),PD={},LD="",SK=0;

function pad(n){return n<10?"0"+n:""+n;}
function fm(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function td(){return fm(new Date());}
function mk(s){return new Date(s+"T00:00:00");}
function es(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function ts(m){var t=document.getElementById("toast");t.innerHTML=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}

function getTasksForDate(ds){
  if(!UD||!UD.tasks) return [];
  var dt=mk(ds),dow=dt.getDay(),dom=dt.getDate();
  var result=[];
  for(var i=0;i<UD.tasks.length;i++){
    var t=UD.tasks[i];
    if(t.freq==="daily"){result.push(t);continue;}
    if(t.freq==="weekly"&&dow===1){result.push(t);continue;}
    if(t.freq==="monthly"&&dom===1){result.push(t);continue;}
    if(t.freq==="custom"&&t.startDate&&t.customDays){
      var start=mk(t.startDate);
      var diff=Math.round((dt-start)/864e5);
      if(diff>=0&&diff%t.customDays===0){result.push(t);continue;}
    }
    if(t.freq==="project"&&t.startDate&&t.deadline){
      var pStart=mk(t.startDate);
      var pEnd=mk(t.deadline);
      if(dt>=pStart&&dt<=pEnd){
        var dayNum=getProjDayNum(t,ds);
        if(dayNum>0&&dayNum<=t.totalDays){result.push(t);continue;}
      }
    }
  }
  return result;
}

function getProjDayNum(t,ds){
  // Count working days from start to ds (inclusive)
  var start=mk(t.startDate);
  var target=mk(ds);
  var count=0;
  var d=new Date(start);
  while(d<=target){
    count++;
    if(fm(d)===ds) return count<=t.totalDays?count:0;
    d.setDate(d.getDate()+1);
  }
  return 0;
}
function cntDone(obj,ds){
  var tasks=getTasksForDate(ds),done=0,total=tasks.length;
  for(var i=0;i<tasks.length;i++) if(obj[tasks[i].id]) done++;
  return{done:done,total:total};
}

function sv(ds,o,cb){db.collection("users").doc(U.uid).collection("days").doc(ds).set(o).then(function(){if(cb)cb();}).catch(function(){ts("Save error");});}

// ── ONBOARDING ───────────────────────────────────
var obTasks=[];
var obStep=1;

function showOnboarding(){
  if(obStep===1) showObStep1();
  else showObStep2();
}

function showObStep1(){
  var root=document.getElementById("root");
  var html='<div class="onboard"><div class="ob-step">Step 1 of 2</div><div class="ob-title">Welcome! Tell us about you</div><div class="ob-sub">This helps us personalize your experience.</div>';
  html+='<div class="card"><label style="margin-top:0">Your Name</label>';
  html+='<input id="obName" placeholder="Enter your full name" value="'+(U.displayName||"")+'">';
  html+='<label>Date of Birth</label>';

  html+='<div style="margin-top:20px"><button class="btn btn-purple" id="obNext">Next &#8250;</button></div></div></div>';

  document.getElementById("obNext").onclick=function(){

}

function showObStep2(){
  var root=document.getElementById("root");
  var html='<div class="onboard"><div class="ob-step">Step 2 of 2</div><div class="ob-title">Create Your Tasks</div><div class="ob-sub">Add the habits and tasks you want to track. You can always edit later.</div>';

  // Add task form
  html+='<div class="card"><div class="card-t">&#10010; Add a Task or Project</div>';
  html+='<div class="freq-pills" style="margin-bottom:12px"><span class="freq-pill on" data-m="task">&#9998; Task</span><span class="freq-pill" data-m="project">&#128197; Project</span></div>';

  // Task form
  html+='<div id="taskForm"><label style="margin-top:0">Task Name</label>';
  html+='<input id="atName" placeholder="e.g. Workout, Read 30 min, Cold outreach...">';
  html+='<label>Description (optional)</label>';
  html+='<input id="atDesc" placeholder="Brief description">';
  html+='<label>Frequency</label>';
  html+='<div class="freq-pills"><span class="freq-pill on" data-f="daily">Daily</span><span class="freq-pill" data-f="weekly">Weekly (Mon)</span><span class="freq-pill" data-f="monthly">Monthly (1st)</span><span class="freq-pill" data-f="custom">Every X days</span></div>';
  html+='<div id="customDaysWrap" style="display:none;margin-top:8px"><label>Repeat every how many days?</label><input id="atCustomDays" type="number" min="2" max="90" placeholder="e.g. 3 = every 3rd day" value="3"></div>';
  html+='<label>Track a number? (optional)</label>';
  html+='<input id="atNum" placeholder="e.g. Responses received, Pages read...">';
  html+='<div style="margin-top:12px"><button class="btn btn-purple btn-small" id="atAdd">+ Add Task</button></div></div>';

  // Project form
  html+='<div id="projForm" style="display:none"><label style="margin-top:0">Project Name</label>';
  html+='<input id="apName" placeholder="e.g. Pitch Deck for Startup X, Revit Model...">';
  html+='<label>Description (optional)</label>';
  html+='<input id="apDesc" placeholder="What is this project about?">';
  html+='<label>Total Hours Needed</label>';
  html+='<input id="apHours" type="number" min="1" max="500" placeholder="e.g. 20">';
  html+='<label>Deadline</label>';
  html+='<input id="apDeadline" type="date" min="'+fm(new Date())+'">';
  html+='<div style="background:#f5f5f7;border-radius:10px;padding:10px;margin-top:8px;font-size:12px;color:#86868b" id="projCalc"></div>';
  html+='<div style="margin-top:12px"><button class="btn btn-green btn-small" id="apAdd">+ Add Project</button></div></div>';

  html+='</div>';

  // Task list
  html+='<div class="card"><div class="card-t">Your Tasks ('+obTasks.length+')</div><div id="obList">';
  if(obTasks.length===0) html+='<div class="empty">No tasks yet. Add at least 1 above.</div>';
  for(var i=0;i<obTasks.length;i++){
    var t=obTasks[i];
    var fLabel=t.freq;
    if(t.freq==="custom") fLabel="Every "+t.customDays+"d";
    if(t.freq==="project") fLabel="Project "+t.totalDays+"d";
    html+='<div class="task-preview"><div class="name">'+es(t.name)+'</div><div class="freq">'+fLabel+'</div><span class="del" data-ri="'+i+'">&#215;</span></div>';
  }
  html+='</div></div>';

  html+='<button class="btn btn-green" id="obDone" style="margin-bottom:20px"'+(obTasks.length===0?" disabled":"")+'>&#10003; Finish Setup &amp; Start Tracking</button>';
  html+='<button style="background:none;border:none;color:#86868b;font-size:13px;cursor:pointer;width:100%;text-align:center;padding:10px" id="obBack">&#8249; Back to Step 1</button>';
  html+='</div>';
  root.innerHTML=html;

  // Mode toggle (Task vs Project)
  var mode="task";
  var modePills=document.querySelectorAll("[data-m]");
  for(var i=0;i<modePills.length;i++) modePills[i].onclick=function(){
    mode=this.dataset.m;
    for(var j=0;j<modePills.length;j++) modePills[j].className="freq-pill"+(modePills[j].dataset.m===mode?" on":"");
    document.getElementById("taskForm").style.display=mode==="task"?"":"none";
    document.getElementById("projForm").style.display=mode==="project"?"":"none";
  };

  // Freq pills
  var selFreq="daily";
  var pills=document.querySelectorAll("[data-f]");
  for(var i=0;i<pills.length;i++) pills[i].onclick=function(){
    selFreq=this.dataset.f;
    for(var j=0;j<pills.length;j++) pills[j].className="freq-pill"+(pills[j].dataset.f===selFreq?" on":"");
    var cw=document.getElementById("customDaysWrap");
    if(cw) cw.style.display=selFreq==="custom"?"":"none";
  };

  // Project calculator
  var apH=document.getElementById("apHours");
  var apD=document.getElementById("apDeadline");
  function calcProj(){
    var hrs=parseInt(apH?apH.value:0)||0;
    var dl=apD?apD.value:"";
    var el=document.getElementById("projCalc");
    if(!el||!hrs||!dl) {if(el) el.textContent="Enter hours and deadline to see plan.";return;}
    var daysNeeded=Math.ceil(hrs/2);
    var daysAvail=Math.ceil((mk(dl)-new Date())/864e5);
    if(daysAvail<=0){el.innerHTML="&#9888; Deadline is in the past!";return;}
    if(daysNeeded>daysAvail){el.innerHTML="&#9888; Not enough time! Need <b>"+daysNeeded+" days</b> but only <b>"+daysAvail+" days</b> left. Increase deadline or reduce hours.";}

  }
  if(apH) apH.oninput=calcProj;
  if(apD) apD.oninput=calcProj;

  // Add task
  document.getElementById("atAdd").onclick=function(){

    var desc=document.getElementById("atDesc").value.trim();
    var numLabel=document.getElementById("atNum").value.trim();
    var taskObj={id:"t_"+Date.now()+"_"+obTasks.length,name:name,desc:desc||"",freq:selFreq,numId:numLabel?("n_"+Date.now()):"",numLabel:numLabel,startDate:td()};
    if(selFreq==="custom"){
      var cd=parseInt(document.getElementById("atCustomDays").value)||3;
      if(cd<2) cd=2;
      taskObj.customDays=cd;
    }
    obTasks.push(taskObj);
    showObStep2();
  };

  // Add project
  var apAddBtn=document.getElementById("apAdd");
  if(apAddBtn) apAddBtn.onclick=function(){
    var name=(document.getElementById("apName").value||"").trim();
    if(!name){ts("Enter project name");return;}
    var desc=(document.getElementById("apDesc").value||"").trim();
    var hrs=parseInt(document.getElementById("apHours").value)||0;
    var dl=document.getElementById("apDeadline").value;

    if(!dl){ts("Set a deadline");return;}
    var daysNeeded=Math.ceil(hrs/2);
    var daysAvail=Math.ceil((mk(dl)-new Date())/864e5);
    if(daysAvail<=0){ts("Deadline is in the past");return;}
    if(daysNeeded>daysAvail){ts("Not enough time! Need "+daysNeeded+" days, only "+daysAvail+" available. Increase deadline or reduce hours.");return;}
    obTasks.push({id:"p_"+Date.now(),name:name,desc:desc||"",freq:"project",totalHours:hrs,hoursPerDay:2,deadline:dl,startDate:td(),totalDays:daysNeeded,numId:"",numLabel:""});

  };

  // Delete
  var dels=document.querySelectorAll("[data-ri]");
  for(var i=0;i<dels.length;i++) dels[i].onclick=function(){obTasks.splice(parseInt(this.dataset.ri),1);showObStep2();};

  // Back
  document.getElementById("obBack").onclick=function(){obStep=1;showObStep1();};

  // Finish
  document.getElementById("obDone").onclick=function(){
    if(obTasks.length===0){ts("Add at least 1 task");return;}
    this.disabled=true;this.textContent="Setting up...";

    db.collection("users").doc(U.uid).set(userData).then(function(){
      UD=userData;
      // Notify admin of new user
      notifyNewUser(userData);

  };
}

// ── STREAK ────────────────────────────────────────
function cS(){
  var s=0,d=new Date(),c2=0;
  function go(){
    if(c2>=120){SK=s;dS();return;}
    var ds=fm(d);
    ld(ds,function(o){
      var c=cntDone(o,ds);
      if(c.total===0&&ds!==td()){SK=s;dS();return;}
      if(c.done>0&&c.done>=Math.ceil(c.total*0.6))s++;
      else if(ds!==td()){SK=s;dS();return;}
      d.setDate(d.getDate()-1);c2++;go();
    });
  }
  go();
}
function dS(){var el=document.getElementById("stk");if(!el)return;if(SK>0)el.innerHTML="&#128293; <b>"+SK+" day"+(SK>1?"s":"")+"</b> streak";else el.textContent="Start your streak today";}

// ── CALENDAR ──────────────────────────────────────
function rC(){
  var y=CM.getFullYear(),m=CM.getMonth();
  var ml=CM.toLocaleDateString("en-IN",{month:"long",year:"numeric"});
  var f=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),now=new Date();
  var h='<div class="card"><div class="mn"><button id="cmp">&#8249;</button><span style="font-size:15px;font-weight:700">'+ml+'</span><button id="cmn">&#8250;</button></div><div class="cg">';
  ["S","M","T","W","T","F","S"].forEach(function(d){h+='<div class="ch">'+d+'</div>';});
  for(var i=0;i<f;i++)h+='<div></div>';
  for(var d=1;d<=dim;d++)h+='<div class="cy" data-cd="'+y+"-"+pad(m+1)+"-"+pad(d)+'" id="cd'+d+'">'+d+'</div>';
  h+='</div></div><div id="cdtl"></div>';
  document.getElementById("vc").innerHTML=h;
  document.getElementById("cmp").onclick=function(){CM.setMonth(CM.getMonth()-1);rC();};
  document.getElementById("cmn").onclick=function(){CM.setMonth(CM.getMonth()+1);rC();};
  for(var d=1;d<=dim;d++)(function(d){
    var ds=y+"-"+pad(m+1)+"-"+pad(d),dt=new Date(y,m,d);
    if(dt>now)return;
    ld(ds,function(o){var el=document.getElementById("cd"+d);if(!el)return;if(ds===td())el.classList.add("now");var c=cntDone(o,ds);if(c.done>0&&c.done===c.total)el.classList.add("pf");else if(c.done>0)el.classList.add("pt");});
  })(d);
  document.querySelectorAll("[data-cd]").forEach(function(el){el.onclick=function(){var ds=this.getAttribute("data-cd");if(mk(ds)>new Date())return;ld(ds,function(o){sDtl(ds,o);});};});
}
function sDtl(ds,obj){
  var tasks=getTasksForDate(ds),c=cntDone(obj,ds);
  var dl=mk(ds).toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"});

}

function gC(uid){var ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",h=0;for(var i=0;i<uid.length;i++){h=((h<<5)-h)+uid.charCodeAt(i);h|=0;}h=Math.abs(h);var c="1PCT-";for(var i=0;i<6;i++){c+=ch[h%ch.length];h=Math.floor(h/ch.length)+i*7+13;}return c;}

// ── REPORT ───────────────────────────────────────
function rP(){
  var now=new Date(),opts="";
  for(var i=0;i<6;i++){var d=new Date(now.getFullYear(),now.getMonth()-i,1);var v=d.getFullYear()+"-"+pad(d.getMonth()+1);opts+='<option value="'+v+'">'+d.toLocaleDateString("en-IN",{month:"long",year:"numeric"})+"</option>";}
  document.getElementById("vp").innerHTML='<div class="card"><div class="card-t">&#128202; Monthly Report</div><select id="rm">'+opts+'</select><div id="rb"><div class="empty">Loading...</div></div><button class="btn btn-green" id="rdl">&#128229; Download Excel Report</button></div>';
  document.getElementById("rm").onchange=lR;
  document.getElementById("rdl").onclick=dlX;
  lR();
}
function lR(){

    var ds=y+"-"+pad(m)+"-"+pad(d);

  })(d);
}

}
